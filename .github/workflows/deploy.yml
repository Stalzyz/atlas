name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          timeout: 600s
          script: |
            set -e
            echo "========================================="
            echo "  Raaghas Auto-Deploy Started"
            echo "  $(date)"
            echo "========================================="

            APP_DIR="/var/www/raaghas_new/current"
            cd $APP_DIR

            echo "[1/4] Pulling latest code from GitHub..."
            git fetch origin main
            git reset --hard origin/main

            echo "[2/4] Installing dependencies..."
            npm install --legacy-peer-deps

            echo "[3/4] Building apps..."
            npm run build

            echo "[4/4] Reloading PM2 processes..."
            pm2 reload all --update-env

            echo "========================================="
            echo "  Deploy Successful! ✅"
            echo "  $(date)"
            echo "========================================="

      - name: Notify success
        if: success()
        run: echo "🚀 Deployment to Raaghas VPS successful!"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed. Check GitHub Actions logs."

