name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Prisma Generate
        run: cd packages/database && npx prisma generate

      - name: Build Next.js & API Apps
        run: |
          export NODE_OPTIONS="--max-old-space-size=4096"
          npm run build
          
      - name: Prepare Standalone Artifacts
        run: |
          mkdir -p .deploy_temp/apps/admin .deploy_temp/apps/storefront .deploy_temp/apps/api
          
          # Move Admin Standalone
          cp -R apps/admin/.next/standalone/* .deploy_temp/ 2>/dev/null || true
          mkdir -p .deploy_temp/apps/admin/.next/static
          cp -R apps/admin/.next/static/* .deploy_temp/apps/admin/.next/static/ 2>/dev/null || true
          cp -R apps/admin/public .deploy_temp/apps/admin/ 2>/dev/null || true
          
          # Move Storefront Standalone
          cp -R apps/storefront/.next/standalone/* .deploy_temp/ 2>/dev/null || true
          mkdir -p .deploy_temp/apps/storefront/.next/static
          cp -R apps/storefront/.next/static/* .deploy_temp/apps/storefront/.next/static/ 2>/dev/null || true
          cp -R apps/storefront/public .deploy_temp/apps/storefront/ 2>/dev/null || true

          # Move API
          cp -R apps/api/dist .deploy_temp/apps/api/ 2>/dev/null || true
          cp apps/api/package.json .deploy_temp/apps/api/ 2>/dev/null || true
          cp -R apps/api/node_modules .deploy_temp/apps/api/ 2>/dev/null || true

          # Move Database
          cp -R packages/database .deploy_temp/packages/ 2>/dev/null || true

          # Create Deploy Tarball
          cd .deploy_temp
          tar -czf ../deploy.tar.gz .

      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          source: "deploy.tar.gz"
          target: "/var/www/raaghas_new/current/"

      - name: Restart Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            cd /var/www/raaghas_new/current
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            pm2 restart all --update-env

      - name: Notify success
        if: success()
        run: echo "🚀 Deployment to Raaghas VPS successful!"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed. Check GitHub Actions logs."
