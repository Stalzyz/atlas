name: VPS Diagnostics

on:
  push:
    branches:
      - main

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run and Commit
        run: |
          echo "${{ secrets.VPS_PASSWORD }}" > pass.txt
          sshpass -f pass.txt ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} -p 22 "echo '--- PM2 STATUS ---' > /tmp/vps_diag.txt; pm2 list >> /tmp/vps_diag.txt; echo '--- PM2 ADMIN DESCRIBE ---' >> /tmp/vps_diag.txt; pm2 describe raaghas-admin >> /tmp/vps_diag.txt; echo '--- CURRENT FOLDER ---' >> /tmp/vps_diag.txt; ls -la /var/www/raaghas_new/current >> /tmp/vps_diag.txt; echo '--- NEXT CACHE ---' >> /tmp/vps_diag.txt; ls -la /var/www/raaghas_new/current/apps/admin/.next >> /tmp/vps_diag.txt 2>&1; echo '--- FILE CHECK ---' >> /tmp/vps_diag.txt; grep -C 2 'XXXL' /var/www/raaghas_new/current/apps/admin/src/app/products/new/page.tsx >> /tmp/vps_diag.txt 2>&1 || echo 'No XXXL in admin' >> /tmp/vps_diag.txt; echo '--- ORDER CHECK ---' >> /tmp/vps_diag.txt; grep -C 2 'ArrowRight' /var/www/raaghas_new/current/apps/admin/src/components/orders/OrderDetailView.tsx >> /tmp/vps_diag.txt 2>&1 || echo 'No Next button' >> /tmp/vps_diag.txt; cat /tmp/vps_diag.txt" > vps_diag.txt
          
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add vps_diag.txt
          git commit -m "chore: add vps diagnostics report [skip ci]" || echo "No changes"
          git push origin main
