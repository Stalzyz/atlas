<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Account Confirmation</title>
  <style>
    body {font-family: 'Inter', sans-serif; color:#1A1A1A; background:#FDFBF7; padding:40px; max-width:600px; margin:auto; border:1px solid #28104E;}
    h1 {color:#28104E; text-align:center;}
    .btn {display:inline-block; margin-top:20px; padding:12px 24px; background:#28104E; color:#fff; text-decoration:none; border-radius:4px;}
  </style>
</head>
<body>
  <h1>Welcome to Atlas Heritage</h1>
  <p>Hello {{userName}},</p>
  <p>Thank you for creating an account. Please confirm your email by clicking the button below:</p>
  <a href="{{confirmationLink}}" class="btn">Confirm Email</a>
  <p>If you did not sign up, you can safely ignore this email.</p>
  <p>Regards,<br/>Team Atlas</p>
</body>
</html>
